{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<section class="auth-card">
  <h1>Sign in</h1>
  <p class="subtitle">Access your courses and grades</p>
  <form method="post" class="form">
    <label for="username">Username</label>
    <input type="text" id="username" name="username" required autofocus>

    <label for="password">Password</label>
    <input type="password" id="password" name="password" required>

    <button type="submit" class="btn btn-primary btn-block">Login</button>
  </form>
  <p class="auth-footer">No account? <a href="{{ url_for('register') }}">Register</a></p>

  <details class="demo-hint">
    <summary>Demo accounts</summary>
    <ul>
      <li>Student: <code>student1</code> / <code>student123</code> (also student2, student3)</li>
      <li>Teacher: <code>teacher1</code> / <code>teacher123</code></li>
    </ul>
  </details>
</section>
{% endblock %}
